<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto History - Veiculo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/paginas/veiculo.css">
</head>
<body>
    <div id="pagina-veiculo">
        <div id="menu"></div>

        <div id="geral">
            <div id="container-1">
                <button onclick="voltar()">Meus veículos</button>
            </div>

            <div id="detalhes-veiculo">

            </div>

            <div id="botoes">
                <div id="modal" class="modal hidden">
                    <div class="modal-content">
                        <h3>Nova Manutenção</h3>

                        <input id="tipo" placeholder="Tipo (Preventiva, Corretiva...)" />
                        <input id="km" placeholder="Quilometragem" />
                        <input id="local" placeholder="Oficina" />
                        <input id="data" type="date" />
                        <input id="descricao" placeholder="Descrição" />

                        <div class="acoes-modal">
                            <button onclick="fecharModal()">Cancelar</button>
                            <button onclick="salvarManutencao()">Salvar</button>
                        </div>
                    </div>
                </div>

            </div>

            <div id="lista-manutencoes">

            </div>
            
        </div>
    </div>
    <script type="text/babel" src="js/baseDoSistema/storage.js" ></script>
    <script type="text/babel" src="js/paginas/veiculo.js" ></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</body>
</html>
